services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lifelikegame
      POSTGRES_PASSWORD: lifelikegame
      POSTGRES_DB: lifelikegame
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifelikegame -d lifelikegame"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      uvicorn lifelikegame.main:app --host 0.0.0.0 --port 8000
      "

volumes:
  pgdata: